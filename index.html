<!DOCTYPE html>
<html>
  <head>
    <title>CampusMart</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-container">
      <h1 class="logo">CampusMart</h1>

      <ul class="nav-links">
        <li>Home</li>
        <li>Products</li>
        <li>Login</li>
        <li>Register</li>
      </ul>
    </div>
  </nav>

  <!-- Main Content -->
 <main class="container">
  <section class="hero">
    <h2>Buy & Sell Items Within Your Campus</h2>
    <p>
      CampusMart helps students buy and sell books, electronics, furniture,
      and more — safely and easily.
    </p>
  </section>

  <!-- Filters -->
  <section class="filters">
    <input
      type="text"
      id="searchInput"
      placeholder="Search products..."
    />

    <select id="categoryFilter">
      <option value="All">All</option>
      <option value="Books">Books</option>
      <option value="Electronics">Electronics</option>
      <option value="Furniture">Furniture</option>
    </select>
  </section>

  <!-- Products -->
  <section class="products" id="productList"></section>
</main>
<script src="script.js"></script>
</body>
</html>
